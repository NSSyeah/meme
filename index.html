<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Kicau Mania</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#ff00cc,#ff6600,#00eaff,#00ff55);
background-size:400% 400%;
animation:bg 6s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.box{
background:rgba(255,255,255,.15);
padding:40px;
border-radius:25px;
backdrop-filter:blur(10px);
max-width:700px;
width:90%;
}

img{
width:280px;
height:280px;
object-fit:cover;
border-radius:50%;
border:8px solid white;
box-shadow:0 15px 35px rgba(0,0,0,.3);
animation:putar 2s linear infinite;
}

@keyframes putar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

h1{
margin-top:25px;
font-size:50px;
color:white;
text-shadow:3px 3px 0 black;
}

p{
margin-top:10px;
font-size:22px;
font-weight:bold;
color:#fff700;
}
</style>
</head>

<body>

<div class="box">

<!-- GANTI FILE GAMBAR -->
<img src="fotoku.jpeg">

<h1>🔥 DJ KICAU MANIA 🔥</h1>
<p>Begitu link dibuka langsung jedag jedug 😭🔥</p>

</div>

<!-- AUDIO -->
<audio id="musik" autoplay loop>
<source src="lagu.mpeg" type="audio/mpeg">
</audio>

<script>
window.onload = function(){

let audio = document.getElementById("musik");

let playPromise = audio.play();

if(playPromise !== undefined){
playPromise.catch(function(){

/* kalau browser blokir autoplay */
document.body.addEventListener("click", function(){
audio.play();
},{once:true});

document.body.addEventListener("touchstart", function(){
audio.play();
},{once:true});

});
}

}
</script>

</body>
</html>

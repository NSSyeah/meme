<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Kicau Mania 🔥</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff00cc,#ff6600,#00eaff,#00ff55);
background-size:400% 400%;
animation:bg 7s infinite alternate;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
text-align:center;
}

img{
width:280px;
height:280px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 15px 35px rgba(0,0,0,.3);
animation:putar 4s linear infinite;
}

@keyframes putar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

h1{
margin-top:25px;
font-size:50px;
color:white;
text-shadow:3px 3px 0 black;
}

p{
margin-top:10px;
font-size:22px;
color:#fff700;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<img src="gambar.png">

<h1>DJ KICAU MANIA</h1>
<p>🔥 Buka Link Langsung Jedag Jedug 🔥</p>

</div>

<!-- AUDIO -->
<audio autoplay loop>
<source src="lagu.mpeg" type="audio/mpeg">
</audio>

</body>
</html>
